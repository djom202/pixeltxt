<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="{{ page.description | default: site.description }}" />
    <meta name="theme-color" content="#8b5cf6" />
    <title>
      {% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}
    </title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%238b5cf6'/%3E%3Cstop offset='50%25' stop-color='%23ec4899'/%3E%3Cstop offset='100%25' stop-color='%23f97316'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect x='2' y='2' width='8' height='8' rx='1' fill='url(%23g)'/%3E%3Crect x='12' y='2' width='8' height='8' rx='1' fill='url(%23g)' opacity='0.7'/%3E%3Crect x='22' y='2' width='8' height='8' rx='1' fill='url(%23g)' opacity='0.4'/%3E%3Crect x='2' y='12' width='8' height='8' rx='1' fill='url(%23g)' opacity='0.7'/%3E%3Crect x='12' y='12' width='8' height='8' rx='1' fill='url(%23g)'/%3E%3Crect x='22' y='12' width='8' height='8' rx='1' fill='url(%23g)' opacity='0.7'/%3E%3Crect x='2' y='22' width='8' height='8' rx='1' fill='url(%23g)' opacity='0.4'/%3E%3Crect x='12' y='22' width='8' height='8' rx='1' fill='url(%23g)' opacity='0.7'/%3E%3Crect x='22' y='22' width='8' height='8' rx='1' fill='url(%23g)'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/main.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>
    <header class="site-header">
      <div class="site-header__inner">
        <a class="site-logo" href="{{ site.baseurl }}/">
          <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#8b5cf6"/>
                <stop offset="50%" stop-color="#ec4899"/>
                <stop offset="100%" stop-color="#f97316"/>
              </linearGradient>
            </defs>
            <rect x="2" y="2" width="8" height="8" rx="2" fill="url(#logoGrad)"/>
            <rect x="12" y="2" width="8" height="8" rx="2" fill="url(#logoGrad)" opacity="0.7"/>
            <rect x="22" y="2" width="8" height="8" rx="2" fill="url(#logoGrad)" opacity="0.4"/>
            <rect x="2" y="12" width="8" height="8" rx="2" fill="url(#logoGrad)" opacity="0.7"/>
            <rect x="12" y="12" width="8" height="8" rx="2" fill="url(#logoGrad)"/>
            <rect x="22" y="12" width="8" height="8" rx="2" fill="url(#logoGrad)" opacity="0.7"/>
            <rect x="2" y="22" width="8" height="8" rx="2" fill="url(#logoGrad)" opacity="0.4"/>
            <rect x="12" y="22" width="8" height="8" rx="2" fill="url(#logoGrad)" opacity="0.7"/>
            <rect x="22" y="22" width="8" height="8" rx="2" fill="url(#logoGrad)"/>
          </svg>
          <span>Pixeltxt</span>
        </a>
        <nav class="site-nav" aria-label="Primary">
          <a href="{{ site.baseurl }}/">Home</a>
          <a href="{{ site.baseurl }}/examples/">Examples</a>
          <a href="https://github.com/djom202/pixeltxt" class="highlight">GitHub</a>
        </nav>
      </div>
    </header>
    <main id="main" class="site-main">{{ content }}</main>
    <footer class="site-footer">
      <div class="site-footer__inner">
        <div class="site-footer__brand">
          <svg width="24" height="24" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="footerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#8b5cf6"/>
                <stop offset="50%" stop-color="#ec4899"/>
                <stop offset="100%" stop-color="#f97316"/>
              </linearGradient>
            </defs>
            <rect x="2" y="2" width="8" height="8" rx="2" fill="url(#footerGrad)"/>
            <rect x="12" y="2" width="8" height="8" rx="2" fill="url(#footerGrad)" opacity="0.7"/>
            <rect x="22" y="2" width="8" height="8" rx="2" fill="url(#footerGrad)" opacity="0.4"/>
            <rect x="2" y="12" width="8" height="8" rx="2" fill="url(#footerGrad)" opacity="0.7"/>
            <rect x="12" y="12" width="8" height="8" rx="2" fill="url(#footerGrad)"/>
            <rect x="22" y="12" width="8" height="8" rx="2" fill="url(#footerGrad)" opacity="0.7"/>
            <rect x="2" y="22" width="8" height="8" rx="2" fill="url(#footerGrad)" opacity="0.4"/>
            <rect x="12" y="22" width="8" height="8" rx="2" fill="url(#footerGrad)" opacity="0.7"/>
            <rect x="22" y="22" width="8" height="8" rx="2" fill="url(#footerGrad)"/>
          </svg>
          <span>Pixeltxt</span>
        </div>
        <div class="site-footer__links">
          <a href="{{ site.baseurl }}/">Home</a>
          <a href="{{ site.baseurl }}/examples/">Examples</a>
          <a href="https://github.com/djom202/pixeltxt">GitHub</a>
          <a href="https://www.npmjs.com/package/pixeltxt-cli">npm</a>
        </div>
        <p class="site-footer__copy">MIT License · Built with Sharp</p>
      </div>
    </footer>
  </body>
</html>
